<script>
// Constants and Configuration
const HALVING_DATES = [
  { date: new Date('2012-11-28'), name: 'Halving 1', visible: true, color: 'hsl(0, 70%, 50%)' },
  { date: new Date('2016-07-09'), name: 'Halving 2', visible: true, color: 'hsl(90, 70%, 50%)' },
  { date: new Date('2020-05-11'), name: 'Halving 3', visible: true, color: 'hsl(180, 70%, 50%)' },
  { date: new Date('2024-04-01'), name: 'Halving 4', visible: true, color: 'hsl(270, 70%, 50%)' }
];
const FOURTH_HALVING_START_PRICE = 69731.26;
const MAX_DAYS = 1446;
const API_ENDPOINTS = {
  localData: "<?php echo get_stylesheet_directory_uri(); ?>/bitcoinDailyData.json",
  binance: "https://api.binance.com/api/v3/klines",
  binanceTicker: "https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT",
  coinGecko: "https://api.coingecko.com/api/v3/coins/bitcoin"
};

// Global state variables
let state = {
  cachedData: null,
  gridApi: null,
  chart: null,
  latestPrice: null,
  priceChange24h: null
};

// Utility functions
function createLoadingIndicator() {
  if (!document.getElementById('loading')) {
    document.body.insertAdjacentHTML('beforeend', '<div id="loading">Loading...</div>');
  }

function removeLoadingIndicator() {
  document.getElementById('loading')?.remove();
}

function formatNumber(value, decimals = 2) {
  return parseFloat(value).toFixed(decimals);
}

function formatLargeNumber(num) {
  if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
  if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
  if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
  return num.toFixed(2);
}

//bit realtime cost
// 개선된 가격 업데이트 함수
async function updateBitcoinPrice() {
  try {
    // 옵션 1: CoinGecko API 사용
    const response = await fetchWithTimeout(API_ENDPOINTS.coinGecko);
    if (response.ok) {
      const data = await response.json();
      const newPrice = data.market_data.current_price.usd;
      const priceChange24h = data.market_data.price_change_percentage_24h;
      
      // 현재 가격 표시 업데이트
      document.getElementById('btcCurrentPrice').textContent = formatNumber(newPrice);
      
      const priceChangeElement = document.getElementById('btcPriceChange');
      priceChangeElement.textContent = `${formatNumber(priceChange24h)}%`;
      priceChangeElement.className = priceChange24h >= 0 ? 'price-up' : 'price-down';
      
      // 마지막 업데이트 타임스탬프 갱신
      document.getElementById('lastUpdated').textContent = moment().format('YYYY-MM-DD HH:mm:ss');
      
      // 캐시된 최신 가격 업데이트
      if (state.latestPrice !== newPrice) {
        state.latestPrice = newPrice;
        
        // 데이터 그리드에서 최신 날짜의 가격만 업데이트 (전체 그리드 새로고침 없이)
        updateLatestDataPrice(newPrice);
      }
      
      return true;
    }
    
    // 옵션 2: CoinGecko가 실패하면 Binance API로 대체
    const binanceResponse = await fetchWithTimeout(API_ENDPOINTS.binanceTicker);
    
    if (binanceResponse.ok) {
      const binanceData = await binanceResponse.json();
      const newPrice = parseFloat(binanceData.lastPrice);
      const priceChange24h = parseFloat(binanceData.priceChangePercent);
      
      // 현재 가격 표시 업데이트
      document.getElementById('btcCurrentPrice').textContent = formatNumber(newPrice);
      
      const priceChangeElement = document.getElementById('btcPriceChange');
      priceChangeElement.textContent = `${formatNumber(priceChange24h)}%`;
      priceChangeElement.className = priceChange24h >= 0 ? 'price-up' : 'price-down';
      
      // 마지막 업데이트 타임스탬프 갱신
      document.getElementById('lastUpdated').textContent = moment().format('YYYY-MM-DD HH:mm:ss');
      
      // 캐시된 최신 가격 업데이트
      if (state.latestPrice !== newPrice) {
        state.latestPrice = newPrice;
        
        // 데이터 그리드에서 최신 날짜의 가격만 업데이트 (전체 그리드 새로고침 없이)
        updateLatestDataPrice(newPrice);
      }
      
      return true;
    }
    
    return false;
  } catch (error) {
    console.error('비트코인 가격 업데이트 실패:', error);
    return false;
  }
}

function updateLatestDataPrice(newPrice) {
  if (!state.gridApi) return;
  
  try {
    // 최신 날짜 데이터 찾기 (첫 번째 행)
    const firstRowNode = state.gridApi.getDisplayedRowAtIndex(0);
    if (!firstRowNode) return;
    
    // 현재 데이터 가져오기
    const rowData = firstRowNode.data;
    if (!rowData) return;
    
    // 가격 업데이트
    const oldPrice = parseFloat(rowData.price);
    
    // 변경 퍼센트 계산
    const changePercent = ((newPrice - oldPrice) / oldPrice * 100).toFixed(2);
    
    // 업데이트된 데이터 생성 - id를 포함해야 함!
    const updatedData = {
      ...rowData,
      id: rowData.id, // 행 ID 명시적으로 포함
      price: formatNumber(newPrice),
      changePercent: changePercent
    };
    
    // 차트 최신 데이터도 업데이트
    updateChartLatestPrice(newPrice);
    
    // 해당 행만 업데이트 (깜박임 방지)
    state.gridApi.applyTransaction({
      update: [updatedData]
    });
  } catch (error) {
    console.warn('최신 가격 업데이트 실패:', error);
    
    // 업데이트 실패 시 백업 방법으로 전체 그리드 새로고침
    try {
      // 깜박임이 있더라도 데이터는 정확히 표시되도록 함
      state.latestPrice = newPrice;
      updateDataGrid();
    } catch (e) {
      console.error('그리드 새로고침 실패:', e);
    }
  }
}

// 차트의 최신 데이터 업데이트
function updateChartLatestPrice(newPrice) {
  if (!state.chart) return;
  
  try {
    // 현재 4차 반감기 시리즈 찾기
    const fourthHalvingSeries = state.chart.series.find(series => 
      series.name === 'Halving 4' || series.name === HALVING_DATES[3].name
    );
    
    if (!fourthHalvingSeries) return;
    
    // 시리즈의 데이터 가져오기
    const seriesData = fourthHalvingSeries.data;
    if (!seriesData || seriesData.length === 0) return;
    
    // 마지막 데이터 포인트 찾기
    const lastPoint = seriesData[seriesData.length - 1];
    if (!lastPoint) return;
    
    // 현재 기준으로 4차 반감기 시작가격과의 비율로 조정된 가격 계산
    const scaledPrice = newPrice;
    
    // 마지막 포인트 값만 업데이트
    lastPoint.update(lastPoint.x, scaledPrice, false);
    
    // 차트 다시 그리기 (깜박임 방지를 위해 애니메이션 없이)
    state.chart.redraw(false);
  } catch (error) {
    console.warn('차트 최신 가격 업데이트 실패:', error);
  }
}

// 실시간 가격 일관성을 위한 변경
function startRealTimePriceUpdates(intervalInSeconds = 30) {
  // 기존 인터벌이 있으면 제거
  if (state.priceUpdateIntervalId) {
    clearInterval(state.priceUpdateIntervalId);
  }
  
  // 즉시 한 번 업데이트
  updateBitcoinPrice();
  
  // 정기적인 업데이트를 위한 인터벌 설정
  const intervalId = setInterval(updateBitcoinPrice, intervalInSeconds * 1000);
  
  // 인터벌 ID 저장
  state.priceUpdateIntervalId = intervalId;
  
  // 업데이트 빈도에 따른 시각적 표시
  const updateIntervalDisplay = document.querySelector('.current-price');
  if (updateIntervalDisplay) {
    // 너무 빠른 업데이트일 경우 시각적 표시 추가
    if (intervalInSeconds <= 5) {
      updateIntervalDisplay.classList.add('rapid-update');
    } else {
      updateIntervalDisplay.classList.remove('rapid-update');
    }
  }
  
  console.log(`가격 업데이트 주기가 ${intervalInSeconds}초로 설정되었습니다.`);
  
  return intervalId;
}

// 이벤트 리스너 추가 (setupEventListeners 함수 내에 추가)
document.getElementById('updateInterval').addEventListener('change', function() {
  const intervalInSeconds = parseInt(this.value);
  startRealTimePriceUpdates(intervalInSeconds);
});

// visibility change 이벤트 리스너 (별도로 추가)
document.addEventListener('visibilitychange', function() {
  const intervalInSeconds = parseInt(document.getElementById('updateInterval').value);
  
  if (document.hidden) {
    // 탭이 보이지 않을 때 자원 절약을 위해 인터벌 제거
    if (state.priceUpdateIntervalId) {
      clearInterval(state.priceUpdateIntervalId);
    }
  } else {
    // 탭이 다시 보이게 되면 인터벌 재시작
    updateBitcoinPrice(); // 즉시 업데이트
    state.priceUpdateIntervalId = setInterval(updateBitcoinPrice, intervalInSeconds * 1000);
  }
});

// Data loading and processing
async function fetchWithTimeout(url, options = {}, timeout = 10000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  
  try {
    const response = await fetch(url, {
      ...options,
      signal: controller.signal
    });
    clearTimeout(id);
    return response;
  } catch (error) {
    clearTimeout(id);
    throw error;
  }
}

async function loadData(url, isLocal = false) {
  try {
    const response = await fetchWithTimeout(url);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}, URL: ${url}`);
    
    const data = await response.json();
    
    return isLocal ? data.map(item => ({
      ...item,
      Start: new Date(item.Start).getTime(),
      End: new Date(item.End).getTime(),
      Close: parseFloat(item.Close)
    })) : data.map(item => ({
      Start: new Date(parseInt(item[0])).getTime(),
      End: new Date(parseInt(item[0])).getTime(),
      Open: parseFloat(item[1]),
      High: parseFloat(item[2]),
      Low: parseFloat(item[3]),
      Close: parseFloat(item[4]),
      Volume: parseFloat(item[5]),
      MarketCap: 0
    }));
  } catch (error) {
    console.error(`Data loading failed: ${url}`, error);
    return [];
  }
}

    const response = await fetchWithTimeout(API_ENDPOINTS.coinGecko);
    if (!response.ok) throw new Error(`CoinGecko API error: ${response.status}`);
    
    const data = await response.json();
    return {
      price: data.market_data.current_price.usd,
      priceChange24h: data.market_data.price_change_percentage_24h,
      marketCap: data.market_data.market_cap.usd,
      volume24h: data.market_data.total_volume.usd,
      high24h: data.market_data.high_24h.usd,
      low24h: data.market_data.low_24h.usd
    };
  } catch (error) {
    console.error("Failed to fetch CoinGecko data", error);
    return null;
  }
}

async function mergeData(localData, binanceData) {
  // Create a Map for faster lookups
  const dataMap = new Map();
  
  // Add local data to map
  localData.forEach(item => {
    dataMap.set(item.Start, item);
  });
  
  // Add or update with Binance data
  binanceData.forEach(item => {
    dataMap.set(item.Start, item);
  });
  
  // Convert map back to array and sort
  return Array.from(dataMap.values()).sort((a, b) => b.Start - a.Start);
}

// Chart functions
function calculateROIMetrics() {
  if (!state.cachedData || state.cachedData.length === 0) return [];
  
  const metrics = [];
  
  HALVING_DATES.forEach((halvingInfo, index) => {
    const { date, name } = halvingInfo;
    
    // Find price at halving
    const halvingData = state.cachedData.find(item => 
      Math.abs(item.Start - date.getTime()) < 24 * 60 * 60 * 1000
    );
    
    if (!halvingData) return;
    
    const startPrice = halvingData.Close;
    
    // Calculate ROI for different periods
    [30, 90, 180, 365].forEach(days => {
      const endDate = new Date(date.getTime() + days * 24 * 60 * 60 * 1000);
      
      // Find closest data point
      const endData = state.cachedData.find(item => 
        Math.abs(item.Start - endDate.getTime()) < 48 * 60 * 60 * 1000
      );
      
      if (endData) {
        const roi = ((endData.Close - startPrice) / startPrice) * 100;
        metrics.push({
          halving: name,
          period: `${days} days`,
          roi: roi.toFixed(2),
          startPrice: startPrice.toFixed(2),
          endPrice: endData.Close.toFixed(2)
        });
      }
    });
  });
  
  return metrics;
}

function updateROIMetricsDisplay() {
  const metrics = calculateROIMetrics();
  const container = document.getElementById('roiMetrics');
  
  if (!container || metrics.length === 0) return;
  
  container.innerHTML = '';
  
  metrics.forEach(metric => {
    const card = document.createElement('div');
    card.className = 'roi-card';
    
    const roiClass = parseFloat(metric.roi) >= 0 ? 'roi-positive' : 'roi-negative';
    
    card.innerHTML = `
      <div class="roi-title">${metric.halving} (${metric.period})</div>
      <div class="roi-value ${roiClass}">${metric.roi}%</div>
      <div class="roi-details">
        $${metric.startPrice} → $${metric.endPrice}
      </div>
    `;
    
    container.appendChild(card);
  });
}

function processChartData() {
  const movingAverageEnabled = document.getElementById('movingAverage').checked;
  const maPeriod = parseInt(document.getElementById('maPeriod').value) || 20;
  const maWidth = parseFloat(document.getElementById('maWidth').value) || 0.5;
  const maColor = document.getElementById('maColor').value || '#000000';
  
  const series = [];
  
  HALVING_DATES.forEach((halvingInfo, index) => {
    const { date, name, visible, color } = halvingInfo;
    
    if (!visible) return;
    
    let filteredData = state.cachedData.filter(item => {
      const daysFromHalving = Math.round((item.Start - date.getTime()) / (1000 * 60 * 60 * 24));
      return daysFromHalving >= 0 && daysFromHalving <= MAX_DAYS;
    });
    
    filteredData.sort((a, b) => a.Start - b.Start); // Sort ascending for chart
    
    if (filteredData.length > 0) {
      const startPrice = filteredData[0].Close;
      const scaleFactor = FOURTH_HALVING_START_PRICE / startPrice;
      
      const seriesData = filteredData.map(item => {
        const daysFromHalving = Math.round((item.Start - date.getTime()) / (1000 * 60 * 60 * 24));
        return [daysFromHalving, item.Close * scaleFactor];
      });
      
      series.push({
        name: name,
        data: seriesData,
        color: color,
        id: `halving-${index}`,
        lineWidth: 2,
        states: {
          hover: {
            lineWidth: 3
          }
        }
      });
      
      if (movingAverageEnabled) {
        series.push({
          type: 'sma',
          linkedTo: `halving-${index}`,
          params: { period: maPeriod },
          lineWidth: maWidth,
          color: maColor,
          name: `${name} SMA(${maPeriod})`
        });
      }
    }
  });
  
  return series;
}

// 4차 반감기 실시간 데이터 업데이트 (formatDataForGrid 함수에 추가)
function formatDataForGrid(data, timeFrame, latestPrice) {
  if (!data || data.length === 0) return [];
  
  let formattedData;
  
  switch (timeFrame) {
    case 'monthly':
      const monthlyData = groupDataByMonth(data);
      formattedData = formatGroupedData(monthlyData, latestPrice, 'month');
      break;
    case 'weekly':
      const weeklyData = groupDataByWeek(data);
      formattedData = formatGroupedData(weeklyData, latestPrice, 'week');
      break;
    default: // daily
      formattedData = formatDailyData(data, latestPrice);
      break;
  }
  
  // 가장 최근 데이터(첫 번째 행)의 가격을 실시간 가격으로 업데이트
  if (formattedData.length > 0 && latestPrice) {
    const today = moment().format('YY.MM.DD');
    
    // 첫 번째 행이 오늘 날짜인지 확인
    if (formattedData[0].day === today) {
      // 오늘 데이터 업데이트
      const oldPrice = parseFloat(formattedData[0].price);
      formattedData[0].price = formatNumber(latestPrice);
      
      // 변경 퍼센트 재계산
      if (formattedData.length > 1) {
        const nextPrice = parseFloat(formattedData[1].price);
        formattedData[0].changePercent = ((latestPrice - nextPrice) / nextPrice * 100).toFixed(2);
      }
    }
  }
  
  return formattedData;
}

function groupDataByMonth(data) {
  const monthlyData = {};
  
  data.forEach(item => {
    const date = moment(item.Start);
    const monthKey = date.format('YYYY-MM');
    
    if (!monthlyData[monthKey]) {
      monthlyData[monthKey] = {
        Start: date.startOf('month').valueOf(),
        End: date.endOf('month').valueOf(),
        Close: item.Close,
        Open: item.Open || item.Close,
        High: item.High || item.Close,
        Low: item.Low || item.Close,
        Volume: item.Volume || 0,
        Count: 1
      };
    } else {
      const month = monthlyData[monthKey];
      month.High = Math.max(month.High, item.High || item.Close);
      month.Low = Math.min(month.Low, item.Low || item.Close);
      month.Volume += item.Volume || 0;
      month.Count += 1;
      
      // Update closing price if this is the last day of the month
      if (date.isSame(date.clone().endOf('month'), 'day')) {
        month.Close = item.Close;
      }
      
      // Update opening price if this is the first day of the month
      if (date.isSame(date.clone().startOf('month'), 'day')) {
        month.Open = item.Open || item.Close;
      }
    }
  });
  
  return Object.values(monthlyData).sort((a, b) => b.Start - a.Start);
}

function groupDataByWeek(data) {
  const weeklyData = {};
  
  data.forEach(item => {
    const date = moment(item.Start);
    const weekKey = date.year() + '-' + date.isoWeek();
    
    if (!weeklyData[weekKey]) {
      weeklyData[weekKey] = {
        Start: date.startOf('isoWeek').valueOf(),
        End: date.endOf('isoWeek').valueOf(),
        Close: item.Close,
        Open: item.Open || item.Close,
        High: item.High || item.Close,
        Low: item.Low || item.Close,
        Volume: item.Volume || 0,
        Count: 1
      };
    } else {
      const week = weeklyData[weekKey];
      week.High = Math.max(week.High, item.High || item.Close);
      week.Low = Math.min(week.Low, item.Low || item.Close);
      week.Volume += item.Volume || 0;
      week.Count += 1;
      
      // Update closing price if this is the last day of the week (Sunday)
      if (date.day() === 0) {
        week.Close = item.Close;
      }
      
      // Update opening price if this is the first day of the week (Monday)
      if (date.day() === 1) {
        week.Open = item.Open || item.Close;
      }
    }
  });
  
  return Object.values(weeklyData).sort((a, b) => b.Start - a.Start);
}

function formatGroupedData(groupedData, latestPrice, periodType) {
  return groupedData.map((item, index, array) => {
    const dateFormat = periodType === 'month' ? 'YY.MM' : 'YY.MM.DD';
    const formattedDate = moment(item.Start).format(dateFormat);
    
    const nextClose = index > 0 ? array[index - 1].Close : latestPrice;
    const changePercent = calculateChangePercent(item.Close, nextClose);
    const changeFromOpen = calculateChangePercent(item.Open, item.Close);
    
    return {
      id: array.length - index,
      day: formattedDate,
      price: formatNumber(item.Close),
      open: formatNumber(item.Open),
      changePercent,
      changeFromOpen,
      high: formatNumber(item.High),
      low: formatNumber(item.Low),
      volume: formatVolume(item.Volume),
      count: item.Count,
      rawData: item // Store raw data for potential further processing
    };
  });
}

function formatDailyData(data, latestPrice) {
  return data.slice().sort((a, b) => b.Start - a.Start).map((item, index, array) => {
    const formattedDate = moment(item.Start).format('YY.MM.DD');
    
    const nextClose = index > 0 ? array[index - 1].Close : latestPrice;
    const changePercent = calculateChangePercent(item.Close, nextClose);
    const changeFromOpen = calculateChangePercent(item.Open || item.Close, item.Close);
    
    return {
      id: array.length - index,
      day: formattedDate,
      price: formatNumber(item.Close),
      open: formatNumber(item.Open || item.Close),
      changePercent,
      changeFromOpen,
      high: formatNumber(item.High || item.Close),
      low: formatNumber(item.Low || item.Close),
      volume: formatVolume(item.Volume),
      rawData: item
    };
  });
}

function calculateChangePercent(startValue, endValue) {
  if (!startValue || !endValue) return 'N/A';
  return ((endValue - startValue) / startValue * 100).toFixed(2);
}

function formatVolume(volume) {
  if (!volume) return 'N/A';
  return formatLargeNumber(volume);
}

// 2. 타임프레임에 따른 필드 크기 균일화
// 컬럼 정의 함수 수정
function getColumnDefs() {
  const width = window.innerWidth;
  const timeFrame = document.getElementById('timeFrame').value;
  
  // 기본 컬럼 너비 설정
  const columnWidth = width < 768 ? 80 : 100;
  
  const baseColumns = [
    { 
      headerName: 'Day', 
      field: 'day', 
      width: columnWidth,
      filter: 'agTextColumnFilter',
      floatingFilter: true
    },
    { 
      headerName: 'Price', 
      field: 'price', 
      width: columnWidth,
      cellStyle: params => stylePriceCell(params),
      filter: 'agNumberColumnFilter',
      floatingFilter: true
    },
    { 
      headerName: 'Change %', 
      field: 'changePercent', 
      width: columnWidth,
      cellStyle: params => styleChangeCell(params),
      filter: 'agNumberColumnFilter',
      floatingFilter: true
    }
  ];
  
  if (width >= 768) {
    baseColumns.push(
      { 
        headerName: 'Open', 
        field: 'open', 
        width: columnWidth,
        filter: 'agNumberColumnFilter',
        floatingFilter: true
      },
      { 
        headerName: 'High', 
        field: 'high', 
        width: columnWidth,
        filter: 'agNumberColumnFilter',
        floatingFilter: true
      },
      { 
        headerName: 'Low', 
        field: 'low', 
        width: columnWidth,
        filter: 'agNumberColumnFilter',
        floatingFilter: true
      }
    );
  }
  
  if (width >= 1024) {
    baseColumns.push(
      { 
        headerName: 'Volume', 
        field: 'volume', 
        width: columnWidth,
        filter: 'agTextColumnFilter',
        floatingFilter: true
      },
      { 
        headerName: 'ID', 
        field: 'id', 
        width: 70,
        filter: 'agNumberColumnFilter',
        floatingFilter: true
      }
    );
  }
  
  // 타임프레임에 따라 헤더명 변경 (너비는 동일하게 유지)
  if (timeFrame === 'weekly') {
    baseColumns[0].headerName = 'Week';
  } else if (timeFrame === 'monthly') {
    baseColumns[0].headerName = 'Month';
  } else {
    baseColumns[0].headerName = 'Day';
  }
  
  return baseColumns;
}

function stylePriceCell(params) {
  if (!params.data) return {};
  
  const change = parseFloat(params.data.changePercent);
  
  if (isNaN(change) || change === 'N/A') return {};
  
  if (change >= 5) return { color: '#007c32', fontWeight: 'bold' };
  if (change <= -5) return { color: '#d91400', fontWeight: 'bold' };
  if (change > 0) return { color: '#007c32' };
  if (change < 0) return { color: '#d91400' };
  
  return {};
}

function styleChangeCell(params) {
  if (!params.data) return {};
  
  const change = parseFloat(params.data.changePercent);
  
  if (isNaN(change) || change === 'N/A') return {};
  
  if (change >= 5) return { color: '#007c32', fontWeight: 'bold' };
  if (change <= -5) return { color: '#d91400', fontWeight: 'bold' };
  if (change > 0) return { color: '#007c32' };
  if (change < 0) return { color: '#d91400' };
  
  return {};
}

    sortable: true, 
    filter: true,

    floatingFilter: true
  },
  rowClassRules: {

  },

    return params.data.id.toString();
  },
  pagination: true,
  paginationPageSize: pageSize,

  enableCellTextSelection: true,
  onGridReady: params => {

  },
  onFirstDataRendered: params => {
    params.api.sizeColumnsToFit();
  }
};
  const gridDiv = document.querySelector('#historyDataGrid');
  
  if (!state.gridApi) {
    new agGrid.Grid(gridDiv, gridOptions);
  } else {
    state.gridApi.setColumnDefs(columnDefs);
    state.gridApi.setRowData(rowData);
    
    // 컬럼 너비 재설정
    // updateDataGrid 함수 수정 (컬럼 너비 조정 부분)
        // 더 간단한 접근법 - 기본 AG Grid 함수만 사용
setTimeout(() => {
  try {
    // 기본 사이즈 조정 기능 사용
    state.gridApi.sizeColumnsToFit();
    
    // 주기적으로 다시 조정 (창 크기 변경시)
    window.addEventListener('resize', () => {
      if (state.gridApi) {
        state.gridApi.sizeColumnsToFit();
      }
    });
    
    adjustGridHeight(pageSize);
  } catch (error) {
    console.warn('그리드 사이즈 조정 실패:', error);
  }
}, 100);

  }

    if (node.data) rowData.push(node.data);
  });
  
  const jsonString = JSON.stringify(rowData, null, 2);
  const blob = new Blob([jsonString], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  
  const link = document.createElement('a');
  link.href = url;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// Main initialization function
async function initApp() {
  createLoadingIndicator();
  
  try {
    // Load initial local data
    const localData = await loadData(API_ENDPOINTS.localData, true);
    
    // Determine date range for Binance API
    const lastLocalDataDate = localData.length > 0 
      ? localData.reduce((prev, current) => (prev.End > current.End) ? prev : current).End 
      : null;
    const nextDay = lastLocalDataDate 
      ? moment(lastLocalDataDate).add(1, 'days').toDate() 
      : new Date('2017-08-17');
    
    // Fetch Binance data
    const binanceUrl = API_ENDPOINTS.binance + '?' + new URLSearchParams({
      symbol: 'BTCUSDT',
      interval: '1d',
      startTime: moment(nextDay).valueOf(),
      endTime: moment().valueOf()
    });
    
    const binanceData = await loadData(binanceUrl);
    
    // Merge all data
    state.cachedData = await mergeData(localData, binanceData);
    
    // Get latest price data
    const coinGeckoData = await fetchCoinGeckoData().catch(() => null);
    
    if (coinGeckoData) {
      state.latestPrice = coinGeckoData.price;
      state.priceChange24h = coinGeckoData.priceChange24h;
      
      // Update price display
      document.getElementById('btcCurrentPrice').textContent = formatNumber(state.latestPrice);
      
      const priceChangeElement = document.getElementById('btcPriceChange');
      priceChangeElement.textContent = `${formatNumber(state.priceChange24h)}%`;
      priceChangeElement.className = state.priceChange24h >= 0 ? 'price-up' : 'price-down';
    } else if (binanceData.length > 0) {
      // Fallback to Binance data if CoinGecko fails
      state.latestPrice = binanceData[0].Close;
      document.getElementById('btcCurrentPrice').textContent = formatNumber(state.latestPrice);
    }
    
    // Update last updated timestamp
    document.getElementById('lastUpdated').textContent = moment().format('YYYY-MM-DD HH:mm:ss');
    
    // Initialize UI components
    setupEventListeners();
    createHalvingToggles();
    updateChart();
    updateDataGrid();
    updateROIMetricsDisplay();
  } catch (error) {
    console.error('Failed to initialize application:', error);
    alert('Failed to load data. Please refresh the page and try again.');
  } finally {
    removeLoadingIndicator();
    // real bitcoin cost
    startRealTimePriceUpdates(1);
  }
}

// Set up all event listeners
function setupEventListeners() {
  // Chart controls
  document.getElementById('scaleType').addEventListener('change', updateChart);
  
  document.getElementById('daysSlider').addEventListener('input', function() {
    document.getElementById('daysValue').textContent = this.value;
    if (state.chart) {
      state.chart.xAxis[0].setExtremes(0, parseInt(this.value));
    }
  });
  
  document.getElementById('mobileDaysInput').querySelector('input').addEventListener('input', function() {
    const days = Math.min(Math.max(parseInt(this.value) || 1, 1), MAX_DAYS);
    if (state.chart) {
      state.chart.xAxis[0].setExtremes(0, days);
    }
  });
  
  // Optional features toggles
  document.querySelectorAll('.checkbox-group input[type="checkbox"]').forEach(checkbox => {
    checkbox.addEventListener('change', () => {
      // Toggle visibility of related input groups
      if (checkbox.id === 'plotBandsLines') {
        document.getElementById('plotInputs').style.display = checkbox.checked ? 'block' : 'none';
      }
      
      if (checkbox.id === 'movingAverage') {
        document.getElementById('maInputs').style.display = checkbox.checked ? 'block' : 'none';
      }
      
      if (checkbox.id === 'showAllHalvings') {
        // Toggle all halvings visibility
        document.querySelectorAll('#halvingToggleContainer input[type="checkbox"]').forEach(halvingCheckbox => {
          halvingCheckbox.checked = checkbox.checked;
          HALVING_DATES[halvingCheckbox.dataset.halvingIndex].visible = checkbox.checked;
        });
      }
      
      // Update chart with new settings
      updateChart();
    });
  });
  
  // Input controls for plot bands/lines and moving averages
  document.querySelectorAll('.plot-input-group input, .ma-input-group input, .ma-input-group select, .ma-input-group input[type="color"]').forEach(input => {
    input.addEventListener('input', updateChart);
  });
  
  // Grid controls
  document.getElementById('pageSizeSelector').addEventListener('change', function() {
    const newSize = parseInt(this.value);
    if (state.gridApi) {
      state.gridApi.paginationSetPageSize(newSize);
      adjustGridHeight(newSize);
    }
  });
  
  document.getElementById('timeFrame').addEventListener('change', updateDataGrid);
  
  document.getElementById('gridSearch').addEventListener('input', function() {
    if (state.gridApi) {
      state.gridApi.setQuickFilter(this.value);
    }
  });
  
  // Export buttons
  document.getElementById('exportCsvBtn').addEventListener('click', exportToCsv);
  document.getElementById('exportJsonBtn').addEventListener('click', exportToJson);
  
  // Responsive handling
  window.addEventListener('resize', function() {
    if (state.gridApi) {
      state.gridApi.setColumnDefs(getColumnDefs());
      state.gridApi.sizeColumnsToFit();
    }
    
    // Toggle between slider and input based on screen size
    const isMobile = window.innerWidth <= 767;
    document.getElementById('daysSlider').style.display = isMobile ? 'none' : 'inline-block';
    document.getElementById('daysValue').style.display = isMobile ? 'none' : 'inline-block';
    document.getElementById('mobileDaysInput').style.display = isMobile ? 'inline-block' : 'none';
    
    updateChart();
  });
}

// Initialize the application
jQuery(document).ready(function($) {
  initApp();
  
  // Set up plot inputs and MA inputs initially hidden
  document.getElementById('plotInputs').style.display = 'none';
  document.getElementById('maInputs').style.display = 'none';
  
  // Set initial value for days slider and mobile input
  document.getElementById('daysValue').textContent = document.getElementById('daysSlider').value;
});
</script>
